<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">EstatePlatform</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html">Listings</a></li>
            <li><a href="add-property.html">Add Property</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <button id="dark-mode-toggle">🌙</button>
        </div>
    </nav>

    <div class="container" id="details-container">
        <div class="details-grid">
            <div>
                <img id="det-img" class="details-img" src="/Users/subhashkumar/Downloads/PHOTO-2026-03-25-14-39-46.jpg" alt="Property Image">
            </div>
            <div class="details-info">
                <h1 id="det-title" style="margin-bottom: 1rem;"></h1>
                <h2 id="det-price" style="color: var(--primary); margin-bottom: 1rem;"></h2>
                <p id="det-loc" style="font-size: 1.1rem; margin-bottom: 0.5rem;"></p>
                <p id="det-type" style="font-size: 1.1rem; margin-bottom: 1.5rem;"></p>
                <h3>Description</h3>
                <p id="det-desc" style="margin-top: 0.5rem; margin-bottom: 2rem;"></p>
                <div class="details-actions">
                    <a id="contact-owner-btn" href="contact.html" class="btn">Contact Owner</a>
                    <a id="edit-property-btn" href="#" class="btn secondary">Edit Property</a>
                    <button id="delete-property-btn" class="btn danger" type="button">Delete Property</button>
                </div>
            </div>
        </div>
    </div>

    <footer><p>&copy; 2026 EstatePlatform. All rights reserved.</p></footer>
    <div id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
