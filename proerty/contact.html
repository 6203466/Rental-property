<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">EstatePlatform</div>
        <ul class="nav-links">
            <li><a href="/proerty/index.html">Home</a></li>
            <li><a href="/proerty/listings.html">Listings</a></li>
            <li><a href="/proerty/add-property.html">Add Property</a></li>
            <li><a href="/proerty/contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <button id="dark-mode-toggle">🌙</button>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="section-title">Contact Us</h2>
            <div id="contact-property-info" class="form-group" style="display:none;">
                <label>Property</label>
                <input type="text" id="contact-property" class="form-control" readonly>
            </div>
            <form id="contact-form">
                <input type="hidden" id="contact-property-id">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email-address" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-bottom: 0.75rem; display: block;">Send to WhatsApp Message</button>
                <a href="mailto:owner@estateplatform.com?subject=Property%20Inquiry" class="btn" style="width: 100%; display: block; text-align: center; background: linear-gradient(135deg, #f59e0b, #ef4444);">Send Email</a>
            </form>
        </div>
    </div>

    <footer><p>&copy; 2026 EstatePlatform. All rights reserved.</p></footer>
    <div id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
