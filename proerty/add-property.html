<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-10">
    <title>Add Property</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">EstatePlatform</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html">Listings</a></li>
            <li><a href="add-property.html">Add Property</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <button id="dark-mode-toggle">🌙</button>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="section-title">List Your Property</h2>
            <form id="add-form">
                <input type="hidden" id="property-id">
                <div class="form-group">
                    <label>Property Title</label>
                    <input type="text" id="title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Price ($/month)</label>
                    <input type="number" id="price" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Property Type</label>
                    <select id="type" class="form-control" required>
                        <option value="House">House</option>
                        <option value="Flat">Flat</option>
                        <option value="Villa">Villa</option>
                        <option value="PG">PG</option>
                    </select>
                </div>
               <div class="form-group">
    <label>Image URL</label>
    <input type="url" id="imageUrl" class="form-control" placeholder="https://...">
</div>
<div class="form-group">
    <label>Or Upload Image</label>
    <input type="file" id="imageFile" class="form-control" accept="image/*">
</div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" class="form-control" rows="4" required></textarea>
                </div>
                <button type="submit" id="submit-btn" class="btn" style="width: 100%;">Add Property</button>
            </form>
        </div>
    </div>

    <footer><p>&copy; 2026 EstatePlatform. All rights reserved.</p></footer>
    <div id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
