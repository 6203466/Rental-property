<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login & Signup</title>
  <link rel="stylesheet" href="/proerty/Login 2/style.css" />
</head>
<body>
  <div class="container">
    <div class="form-box" id="formBox">
      <!-- Login Form -->
      <form id="loginForm" class="form active">
        <h2>Login</h2>
        <input id="loginEmail" type="email" placeholder="Email" required />
        <input id="loginPassword" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <p>Don't have an account? <a href="#" onclick="showSignup()">Sign up</a></p>
        <p id="loginError" class="form-error"></p>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="form">
        <h2>Create Account</h2>
        <input id="signupName" type="text" placeholder="Full Name" required />
        <input id="signupEmail" type="email" placeholder="Email" required />
        <input id="signupPassword" type="password" placeholder="Password" required />
        <button type="submit">Sign Up</button>
        <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        <p id="signupError" class="form-error"></p>
      </form>

      <!-- Account View -->
      <div id="accountBox" class="form" style="display:none;">
        <h2>Your Account</h2>
        <p id="acctName"></p>
        <p id="acctEmail"></p>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>

  <script src="/proerty/Login 2/javascript.js"></script>
</body>
</html>
